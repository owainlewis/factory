# Copy this file to <repository>/.factory/config.toml.
# Repository identity and external state paths are derived from the Git root.
version = 1

poll_every = "30s"
default_runtime = "codex"
default_timeout = "2h"
maximum_timeout = "8h"
max_concurrent_runs = 1

[worker]
kind = "docker"
image = "factory-codex:dev"
memory = "8g"
cpus = 4
pids = 512
codex_auth = "~/.local/share/factory/codex/auth.json"
github_token_env = "FACTORY_GITHUB_TOKEN"

[source]
kind = "github_project"
owner = "owainlewis"
project_number = 16
status_field = "Status"
trusted_users = ["owainlewis"]

[source.states]
ready_for_spec = "Ready For Spec"
creating_spec = "Creating Spec"
ready_to_implement = "Ready To Implement"
implementing = "Implementing"
ready_to_review = "Reviewing"
done = "Done"
