# Run `factory init`, then adapt the generated .factory/config.toml like this.
version = 1
poll_every = "30s"

[worker]
runtime = "codex"
sandbox = "worktree"
timeout = "2h"
maximum_timeout = "8h"
max_concurrent = 1

[source]
command = [".factory/sources/github"]

[trigger.triage]
type = "source"
state = "open"
labels = ["factory:ready-for-spec"]
workflow = ".factory/workflows/triage/WORKFLOW.md"

[trigger.implement]
type = "source"
state = "open"
labels = ["factory:ready-to-implement"]
workflow = ".factory/workflows/implement/WORKFLOW.md"
timeout = "4h"
