# Run `factory init`, then adapt the generated .factory/config.toml like this.
version = 1
poll_every = "30s"

[worker]
runtime = "codex"
sandbox = "worktree"
timeout = "2h"
maximum_timeout = "8h"
max_concurrent = 1

[source]
command = [".factory/sources/github"]

[trigger.triage]
type = "source"
state = "open"
labels = ["factory:ready-for-spec"]
workflow = ".factory/workflows/triage.md"

[trigger.implement]
type = "source"
state = "open"
labels = ["factory:ready-to-implement"]
workflow = ".factory/workflows/implement.md"
timeout = "4h"

[trigger.bug-finder]
type = "schedule"
schedule = "0 9 * * 1"
timezone = "Europe/London"
workflow = ".factory/workflows/bug-finder.md"
