# Copy this file to <repository>/.factory/config.toml.
version = 1
poll_every = "30s"

[worker]
runtime = "codex"
sandbox = "worktree"
timeout = "2h"
maximum_timeout = "8h"
max_concurrent = 1

[source]
type = "github"
project_owner = "owainlewis"
project_number = 16
status_field = "Status"
trusted_users = ["owainlewis"]

[trigger.triage]
type = "status"
status = "Ready For Spec"
workflow = ".factory/workflows/triage/WORKFLOW.md"

[trigger.implement]
type = "label"
label = "agent:ready"
workflow = ".factory/workflows/implement/WORKFLOW.md"
timeout = "4h"

[trigger.maintenance]
type = "schedule"
schedule = "*/10 * * * *"
timezone = "Europe/London"
workflow = ".factory/workflows/maintenance/WORKFLOW.md"
