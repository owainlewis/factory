repo: owainlewis/cortex
kind: rust-cli
priority: medium
goal: Build a fast, minimalist terminal code editor in Rust.

standards:
  profile: rust-cli

checks:
  test: cargo test
  lint: cargo clippy
  format: cargo fmt --check

release:
  type: github
  package: none

automations:
  - weekly-editor-quality-audit

human_review:
  - behavior_changes
  - keybindings
  - releases
  - public_claims
  - deleting_features

