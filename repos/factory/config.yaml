repo: owainlewis/factory
kind: control-plane
priority: high
goal: Keep Code Factory simple, useful, and safe.

standards:
  profile: default

checks:
  config: ruby -e "require 'yaml'; Dir['repos/*/config.yaml'].each { |f| YAML.load_file(f) }"
  references: manual

release:
  type: none

automations:
  - daily-control-plane-audit

human_review:
  - changing_standards
  - changing_repo_registry
  - changing_automation_safety

