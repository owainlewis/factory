repo: owainlewis/cortex
path: ~/Code/github/owainlewis/cortex
purpose: Build a fast, minimalist terminal code editor in Rust.

loops:
  - type: task
    name: issue-to-pr
    prompt: loops/task/issue-to-pr.md
    schedule: manual
    issue_label: factory-ready

safety:
  human_review_required:
    - merging
    - releases
    - editor behavior changes
    - keybinding changes
    - large dependencies
    - public claims

checks:
  test: cargo test
  lint: cargo clippy
  format: cargo fmt --check
