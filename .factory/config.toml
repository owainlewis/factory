version = 1
poll_every = "30s"

[worker]
runtime = "codex"
sandbox = "docker"
timeout = "2h"
maximum_timeout = "8h"
max_concurrent = 1
image = "factory-codex:dev"
memory = "8g"
cpus = 4
pids = 512
codex_auth = "~/.codex/auth.json"
github_token_env = "FACTORY_GITHUB_TOKEN"

[source]
type = "github"
project_owner = "owainlewis"
project_number = 16
status_field = "Status"
trusted_users = ["owainlewis"]

[trigger.triage]
type = "status"
status = "Ready For Spec"
workflow = ".factory/workflows/triage/WORKFLOW.md"

[trigger.implement]
type = "status"
status = "Ready To Implement"
workflow = ".factory/workflows/implement/WORKFLOW.md"
timeout = "4h"
