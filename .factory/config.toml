version = 1
poll_every = "30s"

[worker]
runtime = "codex"
sandbox = "worktree"
timeout = "2h"
maximum_timeout = "8h"
max_concurrent = 1

[source]
command = [
  ".factory/sources/github",
  "--project-owner", "owainlewis",
  "--project-number", "16",
  "--status-field", "Status",
  "--trusted-user", "owainlewis",
]

[trigger.triage]
type = "source"
state = "Ready For Spec"
labels = ["factory:ready"]
workflow = ".factory/workflows/triage/WORKFLOW.md"

[trigger.implement]
type = "source"
state = "Ready To Implement"
labels = ["factory:ready"]
workflow = ".factory/workflows/implement/WORKFLOW.md"
timeout = "4h"

[trigger.dependabot-merge]
type = "schedule"
schedule = "*/10 * * * *"
timezone = "Europe/London"
workflow = ".factory/workflows/dependabot-merge/WORKFLOW.md"
timeout = "30m"
