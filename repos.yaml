# Code Factory repo registry.
# This file controls what agents can inspect and change.

defaults:
  branch_prefix: factory/
  max_open_prs_per_repo: 2
  max_daily_prs_total: 3
  require_human_review: true

repos:
  - name: owainlewis/awesome-artificial-intelligence
    role: audience_growth
    policy: curated-list
    priority: high
    allowed_work:
      - link_checks
      - duplicate_detection
      - issue_creation
      - category_cleanup
      - candidate_resource_research
      - README_consistency
    human_review_required:
      - adding_resources
      - removing_resources
      - changing_categories

  - name: owainlewis/youtube-tutorials
    role: content_distribution
    policy: public-resource-repo
    priority: high
    allowed_work:
      - README_consistency
      - broken_link_fixes
      - tutorial_index_updates
      - metadata_cleanup
      - issue_creation

  - name: owainlewis/blueprint
    role: agent_skills
    policy: public-tooling-repo
    priority: high
    allowed_work:
      - docs_alignment
      - examples
      - tests
      - lint_fixes
      - issue_creation

  - name: owainlewis/neo
    role: agent_orchestration
    policy: product-experiment
    priority: high
    allowed_work:
      - docs_alignment
      - tests
      - small_refactors
      - CI_fixes
      - issue_creation

  - name: owainlewis/cortex
    role: technical_proof
    policy: product-experiment
    priority: medium
    allowed_work:
      - docs_alignment
      - tests
      - small_refactors
      - release_readiness
      - issue_creation

  - name: owainlewis/push
    role: agent_infrastructure
    policy: product-experiment
    priority: medium
    allowed_work:
      - docs_alignment
      - tests
      - small_refactors
      - CI_fixes
      - issue_creation

  - name: owainlewis/website
    role: business_front_door
    policy: business-site
    priority: high
    allowed_work:
      - link_checks
      - copy_consistency
      - metadata_checks
      - accessibility_checks
      - issue_creation
    human_review_required:
      - copy_changes
      - offer_changes
      - pricing_changes

  - name: owainlewis/business-os
    role: operating_base
    policy: private-operating-repo
    priority: high
    allowed_work:
      - docs_alignment
      - stale_reference_detection
      - issue_creation
    human_review_required:
      - strategy_changes
      - new_docs
      - workflow_changes

