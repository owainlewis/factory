<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Turning a vague ticket into executable work</title>
  <desc id="desc">Factory triage inspects a vague ticket and the codebase, then either produces an executable task contract or routes the task to specification, clarification or waiting.</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#172033" flood-opacity=".08"/></filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#7D8AA5"/></marker>
    <style>.t{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#172033}.h{font-size:38px;font-weight:750}.sub{font-size:19px;fill:#657089}.cap{font-size:14px;font-weight:750;letter-spacing:1.2px}.label{font-size:17px;font-weight:700}.body{font-size:15px;fill:#526078}.small{font-size:14px;fill:#657089}.card{fill:#fff;stroke:#DCE2EE;stroke-width:2}.line{fill:none;stroke:#7D8AA5;stroke-width:3;marker-end:url(#a)}</style>
  </defs>
  <rect width="1500" height="900" rx="28" fill="#F7F8FC"/>
  <text class="t h" x="64" y="70">The backlog is the new bottleneck</text>
  <text class="t sub" x="64" y="106">Triage converts partial human intent into a clear decision, not an optimistic guess.</text>

  <text class="t cap" x="70" y="174" fill="#C14E3F">INCOMING TICKET</text>
  <rect x="64" y="196" width="320" height="385" rx="22" fill="#FFF8F5" stroke="#F1D6CD" stroke-width="2" filter="url(#s)"/>
  <rect x="88" y="223" width="101" height="31" rx="15" fill="#FCE4DE"/><text class="t small" x="139" y="244" text-anchor="middle" fill="#A74034">BUG-184</text>
  <text class="t label" x="88" y="294">Fix checkout</text>
  <text class="t body" x="88" y="332">“Checkout is broken for some</text><text class="t body" x="88" y="356">customers. Please investigate.”</text>
  <path d="M88 389H360" stroke="#E7C7BD" stroke-width="2"/>
  <g class="t body"><text x="88" y="425">? no reproduction</text><text x="88" y="461">? no expected behavior</text><text x="88" y="497">? no acceptance criteria</text><text x="88" y="533">? unknown scope and risk</text></g>

  <path class="line" d="M384 389H454"/>
  <text class="t cap" x="460" y="174" fill="#2E5CC2">FACTORY TRIAGE</text>
  <rect x="454" y="196" width="420" height="385" rx="22" fill="#EAF1FF" stroke="#B9CCF7" stroke-width="2" filter="url(#s)"/>
  <text class="t label" x="486" y="239">Inspect before routing</text>
  <g>
    <rect class="card" x="486" y="267" width="356" height="58" rx="13"/><circle cx="514" cy="296" r="10" fill="#356DFF"/><text class="t body" x="537" y="301">read issue history and duplicates</text>
    <rect class="card" x="486" y="338" width="356" height="58" rx="13"/><circle cx="514" cy="367" r="10" fill="#356DFF"/><text class="t body" x="537" y="372">inspect code, tests and ownership</text>
    <rect class="card" x="486" y="409" width="356" height="58" rx="13"/><circle cx="514" cy="438" r="10" fill="#356DFF"/><text class="t body" x="537" y="443">reproduce observable failures</text>
    <rect class="card" x="486" y="480" width="356" height="58" rx="13"/><circle cx="514" cy="509" r="10" fill="#356DFF"/><text class="t body" x="537" y="514">identify missing decisions and risk</text>
  </g>

  <path class="line" d="M874 389H944"/>
  <text class="t cap" x="950" y="174" fill="#087A5D">ONE HONEST ROUTE</text>
  <g filter="url(#s)">
    <rect x="944" y="196" width="490" height="169" rx="20" fill="#E5F6F1" stroke="#A7DCCD" stroke-width="2"/>
    <rect class="card" x="944" y="385" width="230" height="86" rx="17"/><rect class="card" x="1204" y="385" width="230" height="86" rx="17"/><rect class="card" x="944" y="491" width="230" height="86" rx="17"/><rect class="card" x="1204" y="491" width="230" height="86" rx="17"/>
  </g>
  <text class="t label" x="976" y="233" fill="#087A5D">READY TO IMPLEMENT</text>
  <g class="t body"><text x="976" y="267">Clear problem and expected behavior</text><text x="976" y="296">Testable acceptance criteria and checks</text><text x="976" y="325">Relevant evidence, constraints and scope</text></g>
  <g class="t label" text-anchor="middle"><text x="1059" y="420">Ready to specify</text><text x="1319" y="420">Needs information</text><text x="1059" y="526">Wait</text><text x="1319" y="526">Close or duplicate</text></g>
  <g class="t small" text-anchor="middle"><text x="1059" y="447">intent is clear, design is not</text><text x="1319" y="447">ask a precise question</text><text x="1059" y="553">blocked by a real dependency</text><text x="1319" y="553">no work should start</text></g>

  <rect x="64" y="659" width="1370" height="153" rx="22" fill="#172033"/>
  <text class="t cap" x="96" y="700" fill="#9EBBFF">THE EXECUTABLE TASK CONTRACT</text>
  <g class="t label" fill="#fff" text-anchor="middle"><text x="185" y="747" fill="#fff">Problem</text><text x="387" y="747" fill="#fff">Evidence</text><text x="589" y="747" fill="#fff">Expected result</text><text x="791" y="747" fill="#fff">Acceptance</text><text x="993" y="747" fill="#fff">Checks</text><text x="1195" y="747" fill="#fff">Out of scope</text></g>
  <g fill="#356DFF"><circle cx="185" cy="780" r="6"/><circle cx="387" cy="780" r="6"/><circle cx="589" cy="780" r="6"/><circle cx="791" cy="780" r="6"/><circle cx="993" cy="780" r="6"/><circle cx="1195" cy="780" r="6"/></g>
  <text class="t sub" x="750" y="862" text-anchor="middle">A task that an agent can execute well is usually a task a human can execute well too.</text>
</svg>
