<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">The agent control plane</title>
  <desc id="desc">Sources enter a control plane that authorizes, routes and observes work before isolated coding agents produce evidence for human review.</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#172033" flood-opacity=".08"/></filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#7D8AA5"/></marker>
    <style>.t{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#172033}.h{font-size:38px;font-weight:750}.sub{font-size:19px;fill:#657089}.cap{font-size:14px;font-weight:750;letter-spacing:1.2px}.label{font-size:17px;font-weight:700}.body{font-size:15px;fill:#526078}.card{fill:#fff;stroke:#DCE2EE;stroke-width:2}.line{fill:none;stroke:#7D8AA5;stroke-width:3;marker-end:url(#a)}</style>
  </defs>
  <rect width="1400" height="900" rx="28" fill="#F7F8FC"/>
  <text class="t h" x="64" y="70">The rise of the agent control plane</text>
  <text class="t sub" x="64" y="106">A shared layer turns events into safe, observable and repeatable engineering work.</text>
  <text class="t cap" x="68" y="159" fill="#657089">SOURCES</text>
  <g filter="url(#s)"><rect class="card" x="64" y="180" width="225" height="78" rx="16"/><rect class="card" x="311" y="180" width="225" height="78" rx="16"/><rect class="card" x="558" y="180" width="225" height="78" rx="16"/><rect class="card" x="805" y="180" width="225" height="78" rx="16"/></g>
  <g class="t label" text-anchor="middle"><text x="176" y="212">GitHub / Jira</text><text x="423" y="212">Pull requests</text><text x="670" y="212">Schedules</text><text x="917" y="212">Monitoring</text></g>
  <g class="t body" text-anchor="middle"><text x="176" y="237">label or state change</text><text x="423" y="237">opened or updated</text><text x="670" y="237">daily maintenance</text><text x="917" y="237">bug or security signal</text></g>
  <rect x="1090" y="180" width="246" height="78" rx="16" fill="#FFF2DE" stroke="#F0C982" stroke-width="2"/><text class="t label" x="1213" y="212" text-anchor="middle">Trusted approval</text><text class="t body" x="1213" y="237" text-anchor="middle">bind exact task revision</text>
  <path class="line" d="M700 273 V311"/>
  <rect x="52" y="312" width="1296" height="278" rx="26" fill="#EAF1FF" stroke="#B9CCF7" stroke-width="2"/>
  <text class="t cap" x="84" y="350" fill="#2E5CC2">CONTROL PLANE</text>
  <g>
    <rect class="card" x="84" y="377" width="220" height="82" rx="16"/><text class="t label" x="194" y="410" text-anchor="middle">Authorize</text><text class="t body" x="194" y="435" text-anchor="middle">identity, repo, scope</text>
    <rect class="card" x="326" y="377" width="220" height="82" rx="16"/><text class="t label" x="436" y="410" text-anchor="middle">Detect</text><text class="t body" x="436" y="435" text-anchor="middle">deterministic query</text>
    <rect class="card" x="568" y="377" width="220" height="82" rx="16"/><text class="t label" x="678" y="410" text-anchor="middle">Route</text><text class="t body" x="678" y="435" text-anchor="middle">workflow + policy</text>
    <rect class="card" x="810" y="377" width="220" height="82" rx="16"/><text class="t label" x="920" y="410" text-anchor="middle">Coordinate</text><text class="t body" x="920" y="435" text-anchor="middle">lease, queue, retry</text>
    <rect class="card" x="1052" y="377" width="220" height="82" rx="16"/><text class="t label" x="1162" y="410" text-anchor="middle">Observe</text><text class="t body" x="1162" y="435" text-anchor="middle">status, cost, evidence</text>
  </g>
  <path d="M304 418H326M546 418H568M788 418H810M1030 418H1052" stroke="#7D8AA5" stroke-width="3" marker-end="url(#a)"/>
  <rect x="84" y="495" width="1188" height="61" rx="14" fill="#D7E5FF"/><text class="t label" x="678" y="520" text-anchor="middle" fill="#244EAD">Repository policy: workflows · permissions · budgets · evidence · recovery</text><text class="t body" x="678" y="543" text-anchor="middle">versioned beside the code and reviewed like code</text>
  <path class="line" d="M700 590 V627"/>
  <text class="t cap" x="68" y="655" fill="#657089">ISOLATED WORKERS</text>
  <g filter="url(#s)">
    <rect class="card" x="64" y="677" width="368" height="133" rx="20"/><rect class="card" x="456" y="677" width="368" height="133" rx="20"/><rect class="card" x="848" y="677" width="368" height="133" rx="20"/>
  </g>
  <g class="t label"><text x="92" y="714">Worker 01</text><text x="484" y="714">Worker 02</text><text x="876" y="714">Worker 03</text></g>
  <g class="t body"><text x="92" y="746">worktree + agent + approved tools</text><text x="92" y="773">task-scoped credentials and timeout</text><text x="484" y="746">worktree + agent + approved tools</text><text x="484" y="773">task-scoped credentials and timeout</text><text x="876" y="746">worktree + agent + approved tools</text><text x="876" y="773">task-scoped credentials and timeout</text></g>
  <rect x="1240" y="623" width="108" height="187" rx="18" fill="#E5F6F1" stroke="#A7DCCD" stroke-width="2"/><text class="t label" x="1294" y="672" text-anchor="middle">Human</text><text class="t body" x="1294" y="704" text-anchor="middle">align</text><text class="t body" x="1294" y="729" text-anchor="middle">review</text><text class="t body" x="1294" y="754" text-anchor="middle">merge</text><circle cx="1294" cy="783" r="9" fill="#10A37F"/>
  <text class="t sub" x="700" y="860" text-anchor="middle">The agent executes. The control plane decides when, where and under which rules.</text>
</svg>
