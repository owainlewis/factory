<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">A safe self-improving software factory</title>
  <desc id="desc">Human feedback and execution evidence are analyzed into a proposed workflow change, evaluated, reviewed and versioned before affecting future agent runs.</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#172033" flood-opacity=".08"/></filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#7757D9"/></marker>
    <style>.t{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#172033}.h{font-size:38px;font-weight:750}.sub{font-size:19px;fill:#657089}.cap{font-size:14px;font-weight:750;letter-spacing:1.2px}.label{font-size:17px;font-weight:700}.body{font-size:15px;fill:#526078}.small{font-size:14px;fill:#657089}.card{fill:#fff;stroke:#DCE2EE;stroke-width:2}.line{fill:none;stroke:#7757D9;stroke-width:3;marker-end:url(#a)}</style>
  </defs>
  <rect width="1400" height="900" rx="28" fill="#F7F8FC"/>
  <text class="t h" x="64" y="70">Improve the system, not just the prompt</text>
  <text class="t sub" x="64" y="106">A factory learns safely when changes to its process are visible, evaluated and reviewed.</text>

  <rect x="52" y="154" width="1296" height="207" rx="24" fill="#EAF1FF" stroke="#B9CCF7" stroke-width="2"/>
  <text class="t cap" x="84" y="194" fill="#2E5CC2">INNER LOOP · EXECUTE WORK</text>
  <g filter="url(#s)"><rect class="card" x="84" y="222" width="202" height="94" rx="17"/><rect class="card" x="334" y="222" width="202" height="94" rx="17"/><rect class="card" x="584" y="222" width="202" height="94" rx="17"/><rect class="card" x="834" y="222" width="202" height="94" rx="17"/><rect class="card" x="1084" y="222" width="202" height="94" rx="17"/></g>
  <g class="t label" text-anchor="middle"><text x="185" y="258">Task</text><text x="435" y="249">Run versioned</text><text x="435" y="270">workflow</text><text x="685" y="258">Produce evidence</text><text x="935" y="258">Human review</text><text x="1185" y="258">Outcome</text></g>
  <g class="t small" text-anchor="middle"><text x="185" y="286">clear contract</text><text x="435" y="294">agent + policy</text><text x="685" y="286">checks + decisions</text><text x="935" y="286">comments + merge</text><text x="1185" y="286">success or failure</text></g>
  <path class="line" d="M286 269H334M536 269H584M786 269H834M1036 269H1084"/>

  <rect x="52" y="427" width="1296" height="330" rx="24" fill="#F1ECFF" stroke="#CEC0F4" stroke-width="2"/>
  <text class="t cap" x="84" y="467" fill="#6042B4">OUTER LOOP · IMPROVE THE WORKFLOW</text>
  <g filter="url(#s)">
    <rect class="card" x="84" y="500" width="222" height="108" rx="18"/><rect class="card" x="338" y="500" width="222" height="108" rx="18"/><rect class="card" x="592" y="500" width="222" height="108" rx="18"/><rect class="card" x="846" y="500" width="222" height="108" rx="18"/><rect x="1100" y="500" width="202" height="108" rx="18" fill="#E5F6F1" stroke="#A7DCCD" stroke-width="2"/>
  </g>
  <g class="t label" text-anchor="middle"><text x="195" y="538">Collect signals</text><text x="449" y="538">Find a pattern</text><text x="703" y="538">Propose a change</text><text x="957" y="538">Evaluate</text><text x="1201" y="538">Human review</text></g>
  <g class="t small" text-anchor="middle"><text x="195" y="566">comments, retries,</text><text x="195" y="587">failures and cost</text><text x="449" y="566">recurring issue,</text><text x="449" y="587">not one anecdote</text><text x="703" y="566">workflow or skill</text><text x="703" y="587">pull request</text><text x="957" y="566">known tasks and</text><text x="957" y="587">quality measures</text><text x="1201" y="566">approve v8 or</text><text x="1201" y="587">reject safely</text></g>
  <path class="line" d="M306 554H338M560 554H592M814 554H846M1068 554H1100"/>
  <rect x="84" y="644" width="1218" height="75" rx="15" fill="#E3DAFA"/>
  <text class="t label" x="693" y="675" text-anchor="middle" fill="#6042B4">No silent mutation</text>
  <text class="t body" x="693" y="701" text-anchor="middle">The proposed process change is versioned, diffable, reversible and subject to the same review standard as code.</text>
  <path class="line" d="M1185 361 C1185 397 195 391 195 427"/>
  <path class="line" d="M1201 757 C1201 818 1340 818 1340 410 C1340 380 435 390 435 361"/>
  <text class="t sub" x="700" y="852" text-anchor="middle">The output of one run becomes evidence for improving every future run.</text>
</svg>
