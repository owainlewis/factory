# Copy this file to repos/<repo-name>/config.yaml.

repo: owainlewis/example
kind: rust-cli
priority: medium
goal: State the repo goal in one plain sentence.

standards:
  profile: rust-cli

checks:
  test: cargo test
  lint: cargo clippy
  format: cargo fmt --check

release:
  type: github
  package: none

automations:
  - daily-audit

human_review:
  - releases
  - public_claims
  - product_strategy
  - deleting_features
  - license_changes
