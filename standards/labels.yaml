# Standard labels Code Factory should sync across active repos.

labels:
  - name: type:bug
    color: d73a4a
    description: Something is broken.

  - name: type:docs
    color: 0075ca
    description: Documentation work.

  - name: type:test
    color: 0e8a16
    description: Tests or verification.

  - name: type:ci
    color: 5319e7
    description: Continuous integration or automation.

  - name: type:refactor
    color: cfd3d7
    description: Internal code improvement with no behavior change.

  - name: type:feature
    color: a2eeef
    description: New user-visible behavior.

  - name: type:release
    color: fbca04
    description: Release preparation or release notes.

  - name: type:chore
    color: fef2c0
    description: Maintenance work.

  - name: priority:p0
    color: b60205
    description: Urgent and important.

  - name: priority:p1
    color: d93f0b
    description: High priority.

  - name: priority:p2
    color: fbca04
    description: Medium priority.

  - name: priority:p3
    color: cfd3d7
    description: Low priority.

  - name: status:ready
    color: 0e8a16
    description: Ready for implementation.

  - name: status:blocked
    color: b60205
    description: Blocked by missing information or external dependency.

  - name: status:needs-human
    color: d4c5f9
    description: Needs Owain's decision or review.

  - name: factory:audit
    color: 1d76db
    description: Created by a Code Factory audit.

  - name: factory:safe-fix
    color: 0e8a16
    description: Safe for agents to attempt.

  - name: factory:needs-review
    color: d4c5f9
    description: Factory work that needs human review.

  - name: area:docs
    color: 0075ca
    description: Documentation area.

  - name: area:tests
    color: 0e8a16
    description: Test area.

  - name: area:ci
    color: 5319e7
    description: CI area.

  - name: area:security
    color: ee0701
    description: Security area.

  - name: area:release
    color: fbca04
    description: Release area.

  - name: area:architecture
    color: c5def5
    description: Architecture area.

  - name: area:product
    color: f9d0c4
    description: Product area.

