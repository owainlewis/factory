# Curated public resource list.

extends: default

requires:
  curation:
    - Contribution rules are clear.
    - Quality bar is documented.
    - Categories are consistent.
  checks:
    - link check exists or is tracked.
    - duplicate check exists or is tracked.
  review:
    - Adding resources requires human review.
    - Removing resources requires human review.
    - Changing categories requires human review.

