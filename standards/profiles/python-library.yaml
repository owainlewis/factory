# Python library or package.

extends: default

requires:
  checks:
    - tests run through the documented test command.
    - formatting or lint command is documented.
  docs:
    - README has install command.
    - README has a minimal import or usage example.
    - supported Python versions are clear.
  release:
    - PyPI publishing path is documented when applicable.
    - versioning is documented.
    - release notes exist when versions are shipped.

