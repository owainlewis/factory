# Rust CLI or terminal tool.

extends: default

requires:
  checks:
    - "`cargo fmt --check`"
    - "`cargo clippy`"
    - "`cargo test`"
  docs:
    - README has install or run command.
    - README has a minimal example.
    - README lists supported platforms.
    - README lists known limitations.
  release:
    - Release process is documented.
    - crates.io publishing is explicit when applicable.
    - GitHub release notes exist when versions are shipped.

