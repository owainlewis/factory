# Baseline for any active repo.

requires:
  identity:
    - README explains purpose, audience, status, and run or use path.
    - GitHub description is accurate.
    - Topics are useful when public.
  legal:
    - LICENSE exists.
  agent_guidance:
    - AGENTS.md exists.
    - AGENTS.md explains how to test and verify work.
  tracking:
    - Issues are enabled.
    - Standard labels exist.
    - Project board exists.
    - Open issues are linked to the project board.
  quality:
    - Test command is documented or explicitly marked not applicable.
    - CI exists or is explicitly marked not applicable.
  maintenance:
    - Known limitations are documented.
    - Next useful work is tracked as issues.

