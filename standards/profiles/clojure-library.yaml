# Clojure library.

extends: default

requires:
  checks:
    - test command is documented.
    - formatting or lint expectation is clear.
  docs:
    - README has dependency coordinates.
    - README has a minimal REPL usage example.
  release:
    - Clojars publishing path is documented when applicable.
    - versioning is documented.
    - release notes exist when versions are shipped.

