id: repo-description-required
name: Repo description required
severity: warning
applies_to:
  visibility:
    - public
    - private
check:
  source: github
  field: repository.description
  condition: present
fix:
  mode: issue
  safe_auto_fix: false
  guidance: Ask Owain or infer a short factual description from README only when the README is clear.
human_review:
  - public_positioning

