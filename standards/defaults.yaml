# Global defaults for every active Code Factory repo.

owner: owainlewis
local_root: ~/Code/github/owainlewis

github:
  issues: required
  project_board: required
  labels: sync

safety:
  direct_push: never
  auto_merge: never
  max_open_prs: 2

required_files:
  - README.md
  - LICENSE
  - AGENTS.md
  - .gitignore

